<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1 {
            display: inline;
            height: 300px;
            width: 300%;
            background-color: rgb(147, 165, 165);
            

            border: 15px solid darkslategray;


            padding: 10px 10px 10px 10px; /*top right bottom left*/


            margin: 20px 10px 20px 20px; /*top right bottom left*/

            outline: 5px dashed rgb(226, 164, 164);

        }
        a {
            color: rgb(190, 66, 66);
            border-width: 10px;
            border-style: solid;
            border-color:aquamarine;
            border-style: outset;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level </a> Vamos ver como tudo isso funciona</p>
    
</body>
</html>
