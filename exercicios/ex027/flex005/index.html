<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox Centralizado</title>

    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(39, 173, 27);
            display: flex;
            height: 100vh;
            align-items: center;
            
        }

        main {
            background-color: rgb(133, 201, 156);
            width: 100vw;
            height: 300vh;
            display: flex;
            flex-flow: row;
            justify-content: center;
            align-items: center;
            
        }
        section {
            background-color: lightpink;
            height: 200px;
            width: 200px;
        }

    </style>
</head>
<body>
    <main>
        <section>
            <h1>Tela de Login</h1>
        </section>
    </main>
</body>
</html>
