<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        optgroup[label="REG NORDESTE"] {
            color: rgb(245, 127, 17);
            background-color: burlywood;
            
        }
        optgroup[label="REG SUDESTE"] {
            color: rgb(160, 235, 22);
            background-color: rgb(96, 209, 243);
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.js" method="get" autocomplete="on">

        <p>
            <label for="iest">Estado:</label>
            <select name="estado" id="iest">
                <option value="" selected> --- Escolha --- </option>
                <optgroup label="REG SUDESTE">
                    <option value="MG">Minas Gerais</option>
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                </optgroup>
                <optgroup label="REG NORDESTE">
                    <option value="MA">Maranhão</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="CE">Ceará</option>
                    <option value="PE">Pernambuco</option>
                </optgroup>

            </select>
        </p>

        <p>
            <label for="iprof">Profissão:</label>
            <input type="text" name="profissao" id="iprof" list="Istprof">
            <datalist id="Istprof">
                <option value="ADM">Administrador</option>
                <option value="CONT">Contador</option>
                <option value="ENG">Engenheiro</option>
                <option value="MED">Médico</option>
                <option value="DEV">Desenvolvedor</option>

            </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem:</label><br>
            <textarea name="msg" id="imsg" rows="4" cols="50" placeholder="Digite sua mensagem aqui!"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
    
</body>
</html>
