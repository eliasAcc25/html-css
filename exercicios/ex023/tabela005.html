<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 500px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid darkcyan;
            padding: 10px;
            text-align: center;
        }
        caption {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .destaque {
            background-color: rgb(8, 124, 163);
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1>Exercicios de Tabelas</h1>

    <table>
        <caption>
            Cadastro
        </caption>

        <tr>
            <th>Nome</th>
            <th>Sexo</th>
            <th>Idade</th>
            <th>Profissão</th>
        </tr>
        <tr>
            <td>João</td>
            <td>M</td>
            <td>25</td>
            <td>Engenheiro</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>F</td>
            <td>30</td>
            <td>Professora</td>
        </tr>
        <tr>
            <td>Lucas</td>
            <td>M</td>
            <td>28</td>
            <td>Designer</td>
        </tr>
        <tr class="destaque">
            <td>Elias</td>
            <td>M</td>
            <td>27</td>
            <td>Desenvolvedor</td>
        </tr>
    </table>
    
</body>
</html>
